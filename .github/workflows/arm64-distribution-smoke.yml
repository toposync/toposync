name: ARM64 Distribution Smoke

on:
  workflow_dispatch:

jobs:
  arm64-distribution-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Run ARM64 distribution smoke
        run: python scripts/check_arm64_distribution.py
