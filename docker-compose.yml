services:
  toposync:
    image: toposync:local
    build:
      context: .
      target: ${TOPOSYNC_DOCKER_TARGET:-runtime-cpu}
      args:
        TOPOSYNC_APT_PACKAGES: ${TOPOSYNC_APT_PACKAGES:-}
        TOPOSYNC_EXTRA_WHEELS: ${TOPOSYNC_EXTRA_WHEELS:-}
        TOPOSYNC_EXTRA_PIP_PACKAGES: ${TOPOSYNC_EXTRA_PIP_PACKAGES:-}
    ports:
      - "${TOPOSYNC_PORT:-8000}:8000"
    volumes:
      - ${TOPOSYNC_DATA_VOLUME:-./toposync-data}:/data
    restart: unless-stopped
