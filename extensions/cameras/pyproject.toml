[project]
name = "toposync-ext-cameras"
version = "0.1.0"
description = "Toposync first-party extension: Cameras (RTSP) and processing servers (scaffold)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["toposync>=0.1.0", "numpy>=1.26", "opencv-python-headless>=4.10", "httpx>=0.27"]

[project.entry-points."toposync.extensions"]
cameras = "toposync_ext_cameras.plugin:CamerasExtension"

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/toposync_ext_cameras"]
