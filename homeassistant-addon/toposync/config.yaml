name: Toposync
version: "0.3.4"
slug: toposync
description: Run Toposync inside Home Assistant with ingress and internal Core API access.
url: https://github.com/mateuscalza/toposync
startup: application
boot: auto
panel_title: Toposync
panel_icon: mdi:vector-polyline
panel_admin: true
ingress: true
ingress_port: 8000
ingress_stream: true
homeassistant_api: true
arch:
  - amd64
  - aarch64
watchdog: http://[HOST]:[PORT:8000]/api/health
schema: false
