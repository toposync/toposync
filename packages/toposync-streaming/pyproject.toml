[project]
name = "toposync-streaming"
version = "0.3.0"
description = "Toposync application bundle with the optional first-party streaming stack."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "toposync==0.3.0",
  "toposync-ext-streaming>=0.1.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["README.md"]

[tool.uv.sources]
toposync = { path = "../toposync" }
toposync-ext-streaming = { path = "../../extensions/streaming" }
