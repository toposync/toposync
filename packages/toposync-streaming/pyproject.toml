[project]
name = "toposync-streaming"
version = "0.7.2"
description = "Toposync application bundle with the optional first-party streaming stack."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = [
  "toposync==0.7.2",
  "toposync-ext-streaming==0.4.2",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["README.md"]

[tool.uv.sources]
toposync = { path = "../toposync" }
toposync-ext-streaming = { path = "../../extensions/streaming" }
