[project]
name = "toposync-vision-directml"
version = "0.4.24"
description = "Toposync application bundle with ONNX Runtime DirectML acceleration."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = [
  "toposync-core==0.4.24",
  "toposync-ext-structural==0.1.15",
  "toposync-ext-models==0.1.15",
  "toposync-ext-home-assistant==0.1.17",
  "toposync-ext-images==0.1.15",
  "toposync-ext-cameras==0.1.20",
  "toposync-ext-vision==0.1.22",
  "onnxruntime-directml>=1.20",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["README.md"]

[tool.uv.sources]
toposync-core = { path = "../.." }
toposync-ext-structural = { path = "../../extensions/structural" }
toposync-ext-models = { path = "../../extensions/models" }
toposync-ext-home-assistant = { path = "../../extensions/home_assistant" }
toposync-ext-images = { path = "../../extensions/images" }
toposync-ext-cameras = { path = "../../extensions/cameras" }
toposync-ext-vision = { path = "../../extensions/vision" }
