[project]
name = "toposync"
version = "0.7.9"
description = "Toposync default application bundle."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = [
  "toposync-core==0.7.9",
  "toposync-ext-structural==0.7.9",
  "toposync-ext-models==0.7.9",
  "toposync-ext-home-assistant==0.7.9",
  "toposync-ext-images==0.7.9",
  "toposync-ext-cameras==0.7.9",
  "toposync-ext-vision==0.7.9",
  "toposync-ext-spatial-video==0.7.9",
  "onnxruntime>=1.20",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["README.md"]

[tool.uv.sources]
toposync-core = { path = "../.." }
toposync-ext-structural = { path = "../../extensions/structural" }
toposync-ext-models = { path = "../../extensions/models" }
toposync-ext-home-assistant = { path = "../../extensions/home_assistant" }
toposync-ext-images = { path = "../../extensions/images" }
toposync-ext-cameras = { path = "../../extensions/cameras" }
toposync-ext-vision = { path = "../../extensions/vision" }
toposync-ext-spatial-video = { path = "../../extensions/spatial_video" }
